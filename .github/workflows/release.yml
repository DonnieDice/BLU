name: Package and Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'           # v1.2.3
      - 'v[0-9]+.[0-9]+.[0-9]+-beta*'      # v1.2.3-beta.1
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha*'     # v1.2.3-alpha.1
    branches:
      - alpha
      - dev

env:
  CF_API_KEY: ${{ secrets.CF_API_KEY }}
  WOWI_API_TOKEN: ${{ secrets.WOWI_API_TOKEN }}
  WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
  GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}  # 🔐 Store securely!

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🛠️ Clone Project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🧰 Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: 🧑‍🔧 Configure Git User
        run: |
          git config --global user.name "donniedice"
          git config --global user.email "donniedice@protonmail.com"

      - name: 🧭 Determine Release Type
        id: release_type
        run: |
          case "${{ github.ref }}" in
            refs/tags/*)
              if [[ "${{ github.ref }}" == *"beta"* ]]; then
                echo "type=beta" >> $GITHUB_OUTPUT
              elif [[ "${{ github.ref }}" == *"alpha"* ]]; then
                echo "type=alpha" >> $GITHUB_OUTPUT
              else
                echo "type=release" >> $GITHUB_OUTPUT
              fi
              ;;
            refs/heads/dev)
              echo "type=dev" >> $GITHUB_OUTPUT
              ;;
            refs/heads/alpha)
              echo "type=alpha-branch" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "type=unknown" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: 📦 Extract Version from TOC
        id: version
        run: |
          version=$(grep -oP '^## Version: \K(.*)' BLU.toc)
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" >> $GITHUB_OUTPUT

      - name: Validate Release Metadata
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          curse_id="$(grep -oP '^## X-Curse-Project-ID:\s*\K(.*)' BLU.toc || true)"
          wago_id="$(grep -oP '^## X-Wago-ID:\s*\K(.*)' BLU.toc || true)"
          wowi_id="$(grep -oP '^## X-WoWI-ID:\s*\K(.*)' BLU.toc || true)"

          echo "Detected project IDs:"
          echo "  X-Curse-Project-ID: ${curse_id:-missing}"
          echo "  X-Wago-ID: ${wago_id:-missing}"
          echo "  X-WoWI-ID: ${wowi_id:-missing}"

          if [[ -z "$wago_id" ]]; then
            echo "::warning::X-Wago-ID is missing in BLU.toc. Wago upload will be skipped."
          fi

          if [[ -z "$wowi_id" ]]; then
            echo "::warning::X-WoWI-ID is missing in BLU.toc. WoWInterface upload will be skipped."
          fi

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"

            if [[ "$tag" != "$version" ]]; then
              echo "::error::Tag '$tag' does not match BLU.toc version '$version'."
              exit 1
            fi

            if [[ -z "$curse_id" ]]; then
              echo "::error::Missing X-Curse-Project-ID in BLU.toc. CurseForge upload cannot run."
              exit 1
            fi

            if [[ -z "${CF_API_KEY:-}" ]]; then
              echo "::error::CF_API_KEY secret is missing. CurseForge upload cannot run."
              exit 1
            fi
          fi

      - name: 📝 Extract Latest Changelog
        id: changelog
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          short_version="${version#v}"

          if [[ -f "docs/changelogs/${short_version}.md" ]]; then
            changelog_content="$(cat "docs/changelogs/${short_version}.md")"
          elif [[ -f "docs/CHANGES.md" ]]; then
            changelog_content="$(awk '
              /^## / {
                if (started) { exit }
                started=1
              }
              started { print }
            ' docs/CHANGES.md)"
          else
            changelog_content="No changelog available."
          fi

          # Keep embed size safe for Discord limits.
          if ((${#changelog_content} > 2500)); then
            changelog_content="${changelog_content:0:2497}..."
          fi

          {
            echo "body<<EOF"
            echo "$changelog_content"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 📦 Package and Release
        uses: BigWigsMods/packager@master

      - name: ℹ️ Upload Notes
        run: |
          echo "CurseForge, Wago, and WoWInterface uploads are handled by BigWigsMods/packager."
          echo "Project IDs come from X-Curse-Project-ID, X-Wago-ID, and X-WoWI-ID in BLU.toc."

      - name: 📢 Send Discord Notification
        if: success()
        shell: bash
        env:
          CHANGELOG_CONTENT: ${{ steps.changelog.outputs.body }}
          RELEASE_TYPE: ${{ steps.release_type.outputs.type }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TIMESTAMP: ${{ steps.version.outputs.timestamp }}
        run: |
          changelog_content="${CHANGELOG_CONTENT}"
          release_type="${RELEASE_TYPE}"
          version="${RELEASE_VERSION}"

          case "$release_type" in
            "release")
              title="BLU | Better Level-Up! ${version}"
              color=385018
              footer="RGX Mods • Stable Release"
              intro="A new stable release is live."
              fields='[
                {"name":"Channel","value":"Release","inline":true},
                {"name":"Downloads","value":"[CurseForge](https://www.curseforge.com/wow/addons/blu-better-level-up) • [Wago](https://addons.wago.io/addons/vEGPgWK1) • [GitHub](https://github.com/DonnieDice/BLU/releases)","inline":false}
              ]'
              ;;
            "beta")
              title="BLU | Better Level-Up! ${version} (Beta)"
              color=16744448
              footer="RGX Mods • Beta Build"
              intro="Beta build for testing."
              fields='[
                {"name":"Channel","value":"Beta","inline":true},
                {"name":"Downloads","value":"[CurseForge](https://www.curseforge.com/wow/addons/blu-better-level-up) • [GitHub](https://github.com/DonnieDice/BLU/releases)","inline":false}
              ]'
              ;;
            "alpha"|"alpha-branch")
              title="BLU | Better Level-Up! ${version} (Alpha)"
              color=385018
              footer="RGX Mods • Alpha Build"
              intro="Alpha build for testing."
              fields='[
                {"name":"Channel","value":"Alpha","inline":true},
                {"name":"Downloads","value":"[CurseForge](https://www.curseforge.com/wow/addons/blu-better-level-up) • [GitHub](https://github.com/DonnieDice/BLU/tree/alpha)","inline":false}
              ]'
              ;;
            "dev")
              title="BLU | Better Level-Up! ${version} (Dev)"
              color=3447003
              footer="RGX Mods • Dev Build"
              intro="Development build from the dev branch."
              fields='[
                {"name":"Channel","value":"Dev","inline":true},
                {"name":"Branch","value":"`dev`","inline":true}
              ]'
              ;;
            *)
              title="BLU | Better Level-Up! ${version}"
              color=10000000
              footer="RGX Mods"
              intro="Build completed."
              fields='[]'
              ;;
          esac

          desc=$(cat <<EOF
          ${intro}

          ### What's New
          ${changelog_content}
          EOF
          )

          jq -n \
            --arg username "BLU Notification" \
            --arg avatar_url "https://raw.githubusercontent.com/DonnieDice/BLU/main/media/Textures/logo.png" \
            --arg title "$title" \
            --arg desc "$desc" \
            --argjson color "$color" \
            --arg footer "$footer" \
            --arg icon_url "https://raw.githubusercontent.com/donniedice/SimpleQuestPlates/main/images/kiwi.gif" \
            --arg timestamp "${RELEASE_TIMESTAMP}" \
            --argjson fields "$fields" \
            '{
              username: $username,
              avatar_url: $avatar_url,
              embeds: [{
                title: $title,
                description: $desc,
                color: $color,
                footer: {
                  text: $footer,
                  icon_url: $icon_url
                },
                fields: $fields,
                timestamp: $timestamp
              }]
            }' > payload.json

          curl -H "Content-Type: application/json" -X POST -d @payload.json "$DISCORD_WEBHOOK"

      - name: ❌ Send Failure Notification
        if: failure()
        run: |
          jq -n \
            --arg version "${{ steps.version.outputs.version || 'Unknown' }}" \
            --arg run_id "${{ github.run_id }}" \
            --arg timestamp "${{ steps.version.outputs.timestamp }}" \
            '{
              username: "BLU Build Failed",
              avatar_url: "https://raw.githubusercontent.com/DonnieDice/BLU/main/media/Textures/logo.png",
              embeds: [{
                title: "❌ BLU Build Failed",
                description: "The release workflow encountered an error",
                url: "https://github.com/DonnieDice/BLU/actions/runs/\($run_id)",
                color: 15158332,
                fields: [
                  { "name": "Version", "value": $version, "inline": true },
                  { "name": "Workflow", "value": "[View Logs](https://github.com/DonnieDice/BLU/actions/runs/\($run_id))", "inline": true }
                ],
                footer: {
                  "text": "RGX Mods - Build System",
                  "icon_url": "https://raw.githubusercontent.com/donniedice/SimpleQuestPlates/main/images/kiwi.gif"
                },
                timestamp: $timestamp
              }]
            }' > payload.json
          curl -H "Content-Type: application/json" -X POST -d @payload.json $DISCORD_WEBHOOK

